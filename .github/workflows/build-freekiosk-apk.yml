name: Build patched FreeKiosk APK

# Builds FreeKiosk from a chosen release tag, applies the battery-lock patch,
# and produces an installable APK — entirely on GitHub's servers.
# Trigger it manually from the Actions tab ("Run workflow").

on:
  workflow_dispatch:
    inputs:
      source_tag:
        description: "FreeKiosk release tag to build from"
        default: "v1.2.19"
        required: true
      patch_file:
        description: "Patch file name in the repo root"
        default: "freekiosk-battery-lock-v1.2.19.patch"
        required: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the fork (full history so tags are available)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Apply the patch on top of the chosen release tag
        run: |
          set -e
          # Save the patch (it only exists on the default branch, not in the tag)
          cp "${{ github.event.inputs.patch_file }}" /tmp/battery-lock.patch
          # Same for the managed-config patch — copy it from the checked-out ref
          # (branch or main) NOW, before switching the tree to the release tag,
          # so the build works when dispatched from a feature branch too (the
          # patch may not be on origin/main yet).
          cp freekiosk-managed-config-v1.2.19.patch /tmp/managed-config.patch
          # Patch-flags base + the feature patches (each ADB-toggleable via
          # patch_* flags; see freekiosk-patch-flags). Copy them all out before
          # the tag checkout so branch dispatches work.
          cp freekiosk-patch-flags-v1.2.19.patch /tmp/patch-flags.patch
          cp freekiosk-keyboard-fix-v1.2.19.patch /tmp/keyboard-fix.patch
          cp freekiosk-boot-launch-v1.2.19.patch /tmp/boot-launch.patch
          cp freekiosk-screen-sleep-v1.2.19.patch /tmp/screen-sleep.patch
          cp freekiosk-refresh-button-v1.2.19.patch /tmp/refresh-button.patch
          cp freekiosk-webview-render-recovery-v1.2.19.patch /tmp/webview-render-recovery.patch
          cp freekiosk-camera-teardown-v1.2.19.patch /tmp/camera-teardown.patch
          cp freekiosk-webview-resilience-v1.2.19.patch /tmp/webview-resilience.patch
          # Forks don't always carry the release tags, so pull them from the
          # original FreeKiosk repo, then switch the source tree to that release.
          git remote add upstream https://github.com/RushB-fr/freekiosk.git || true
          git fetch --tags upstream
          git checkout "${{ github.event.inputs.source_tag }}"
          # Apply it
          git apply --verbose --whitespace=nowarn /tmp/battery-lock.patch
          git add -A
          # Apply refresh button (touches WebViewComponent.tsx only - no overlap)
          # (copied to /tmp above, before the tag checkout, like the others, so
          # the build is fully self-contained on the dispatched ref)
          git apply --3way --verbose --whitespace=nowarn /tmp/refresh-button.patch
          git add -A
          # Apply managed-config remote settings.
          # ORDERING CONSTRAINT: this MUST come after the battery-lock patch —
          # its apply table references StorageService battery-protection setters
          # (saveBatteryLockThreshold etc.) that only exist once battery-lock has
          # been applied, and its storage.ts hunk was diffed against the
          # post-battery-lock file. Do not reorder these git apply steps. If the
          # battery patch's storage.ts lines shift, regenerate this patch rather
          # than hand-editing it.
          # (patch already copied to /tmp above, before the tag checkout, so this
          # works whether the build is dispatched from main or a feature branch.)
          git apply --3way --verbose --whitespace=nowarn /tmp/managed-config.patch
          git add -A
          # ---- ADB-toggleable feature patches -----------------------------------
          # patch-flags is the base: it adds the ADB `patch_*` ingestion
          # (MainActivity.handleAdbConfig) + KioskModule.getPatchFlags() the JS
          # feature patches read, so it MUST come before the features. This order
          # is chosen so files touched by more than one (MainActivity.kt:
          # patch-flags/keep-screen-on/keyboard-fix) apply as a stable sequence.
          # Each defaults ON; disable via
          # `adb ... --es config '{"patch_<name>":"false"}'`.
          git apply --3way --verbose --whitespace=nowarn /tmp/patch-flags.patch
          git add -A
          # keyboard-fix REPLACES keyboard-gap (same MainActivity region, same
          # sequence slot). keyboard-gap reset its stale padding from the very
          # insets callbacks that Kyocera DuraForce2 / Android 10 never delivers
          # after the IME hides, so the white band survived it. keyboard-fix
          # recomputes IME coverage on every layout pass and adds a watchdog that
          # forces the WindowManager relayout round-trip (the power-menu heal)
          # while keyboard padding is applied. ADB-toggleable: patch_keyboard_fix.
          git apply --3way --verbose --whitespace=nowarn /tmp/keyboard-fix.patch
          git add -A
          # boot-launch REPLACES boot-splash (same relaxed non-DO gate, same
          # patch_boot_splash flag) and adds the missing reliability layer:
          # Android 10 silently discards the receiver's startActivity at boot
          # (background-activity-launch restriction) unless an exemption applies,
          # which is why the splash only appeared "sometimes" — and always after
          # a PIN unlock, where launches queue behind the keyguard. The receiver
          # keeps exactly ONE non-blocking attempt (no retry loops in receiver
          # context); the retry engine lives in KioskWatchdogService (START_STICKY
          # FGS, own handler): an accelerated boot phase retries every ~1.8s up to
          # 5x with positive confirmation via BootLockActivity.running, then hands
          # over to the normal 10s loop. MainActivity also refreshes the
          # device-encrypted fast-boot flag on every start so the FIRST reboot
          # after enabling kiosk already takes the instant LOCKED_BOOT path.
          # For fully deterministic boot launch, additionally grant FreeKiosk
          # "Display over other apps" (SYSTEM_ALERT_WINDOW) — a documented BAL
          # exemption.
          git apply --3way --verbose --whitespace=nowarn /tmp/boot-launch.patch
          git add -A
          # screen-sleep REPLACES keep-screen-on + screen-wakelock as their exact
          # union (verified byte-identical content, flags patch_keep_screen_on and
          # patch_wakelock preserved). The two are disjoint halves of one feature:
          # the conditional FLAG_KEEP_SCREEN_ON covers FreeKiosk's own window flag;
          # the wake-lock neutralizer covers the page's navigator.wakeLock, which
          # Chromium honors independently of any window flag. The document-start
          # wake gate that closes the load-time acquisition race lives in
          # webview-resilience (single owner of injectedJavaScriptBeforeContentLoaded).
          git apply --3way --verbose --whitespace=nowarn /tmp/screen-sleep.patch
          git add -A
          # webview-render-recovery — backport of upstream commit 9ffdc7b (#198),
          # which landed after v1.2.19: when the Chromium renderer process dies
          # (typically an OOM kill) the WebView goes defunct — a blank white
          # screen that only a reload/remount clears. This wires
          # onRenderProcessGone -> full WebView remount (webViewKey bump) with a
          # crash-loop backoff. Applied LAST: it touches WebViewComponent.tsx and
          # KioskScreen.tsx, which screen-wakelock also edits, and was diffed
          # against the post-wakelock tree.
          git apply --3way --verbose --whitespace=nowarn /tmp/webview-render-recovery.patch
          git add -A
          # camera-teardown — root-cause fixes for camera contention with the
          # WebView's getUserMedia scanner (Kyocera DuraForce2):
          # (1) vision-camera is now lazy-required and MotionDetector only mounts
          #     when the motion feature is enabled, so a kiosk with motion off
          #     makes ZERO camera-service calls (previously CameraDevicesManager
          #     registered a permanent availability callback at every launch);
          # (2) CameraPhotoModule releases every camera resource in a finally
          #     block and reaps a camera that finishes opening after the 5s
          #     timeout — previously that device leaked open, wedging the camera
          #     for every app until reboot;
          # (3) log-only getUserMedia diagnostics ([FreeKioskCam] in logcat).
          # Applied LAST: touches WebViewComponent.tsx + KioskScreen.tsx like the
          # patches above; diffed against the post-recovery tree.
          git apply --3way --verbose --whitespace=nowarn /tmp/camera-teardown.patch
          git add -A
          # webview-resilience — WebViewComponent-only changes:
          # (1) getUserMedia wrapper (document-start): 8s no-settle watchdog +
          #     one transparent 1.2s retry for the retryable error class,
          #     absorbing the Kyocera legacy-HAL cold-start race that camera
          #     teardown alone cannot remove (it is below the app). Full
          #     [FreeKioskCam] logging retained.
          # (2) the PDF-link MutationObserver is debounced (500ms) — it used to
          #     rescan every anchor on every DOM mutation, visibly delaying tap
          #     handling on heavy SPA pages (1000+ card lists) on slow CPUs.
          # (3) document-start wake-lock gate (composed with the camera wrapper —
          #     this patch is the single owner of injectedJavaScriptBeforeContentLoaded):
          #     brokers navigator.wakeLock.request before any page script runs, so
          #     a Screen Wake Lock the page acquires DURING load can be released
          #     when Keep Screen On is off. screen-sleep's neutralize/restore
          #     scripts flip the gate live; without this patch they fall back to
          #     the legacy stub-swap.
          # (4) camera wrapper v3 (Firefox-like seamless switch): PROACTIVELY
          #     release the old camera before the first attempt on a switch
          #     (video request + a live video stream already in the registry),
          #     then poll-retry the open on the HAL-lockout trifecta only
          #     (NotReadableError/TrackStartError/AbortError — structural errors
          #     surface at once) until it succeeds or a ~7s budget elapses, with
          #     the page's getUserMedia promise kept pending throughout so the
          #     transient error is never delivered. Registry pruned via track
          #     'ended' listeners so an app-stopped stream can't fake a switch.
          # (5) [FreeKioskNet] fetch+XHR instrumentation (log-only, query strings
          #     stripped): names endpoints that hang/fail for the reboot-immune
          #     infinite-spinner / partial-load reports.
          # (6) triple-press the refresh button within 2s → clearCache(true)+reload
          #     (operator self-service recovery; single press unchanged).
          # Applied last; diffed against the post-camera-teardown tree.
          git apply --3way --verbose --whitespace=nowarn /tmp/webview-resilience.patch
          git add -A
          # Bump versionCode so this build installs over the previous test build
          sed -E -i 's/versionCode [0-9]+/versionCode 60/' android/app/build.gradle
          sed -E -i 's/versionName "[^"]+"/versionName "1.2.37"/' android/app/build.gradle
          grep -E "versionCode|versionName" android/app/build.gradle
          grep versionCode android/app/build.gradle
          echo "Patch applied cleanly on top of ${{ github.event.inputs.source_tag }}"

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install required SDK packages
        run: |
          yes | sdkmanager --licenses >/dev/null 2>&1 || true
          sdkmanager \
            "platform-tools" \
            "platforms;android-36" \
            "build-tools;36.0.0" \
            "ndk;27.1.12297006" \
            "cmake;3.22.1"

      - name: Create Gradle build config
        run: cp android/gradle.properties.template android/gradle.properties

      - name: Configure signing
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            # build.gradle's signingConfig resolves storeFile relative to the
            # app module (android/app/), so the keystore must live there.
            echo "$KEYSTORE_BASE64" | base64 -d > android/app/fleet.keystore
            {
              echo "FREEKIOSK_UPLOAD_STORE_FILE=fleet.keystore"
              echo "FREEKIOSK_UPLOAD_STORE_PASSWORD=$KEYSTORE_PASSWORD"
              echo "FREEKIOSK_UPLOAD_KEY_ALIAS=$KEY_ALIAS"
              echo "FREEKIOSK_UPLOAD_KEY_PASSWORD=$KEY_PASSWORD"
            } >> android/gradle.properties
            echo "Signing with your fleet keystore."
          else
            echo "::warning::No KEYSTORE_BASE64 secret set — building with the built-in debug key. Fine for a first test, NOT for fleet rollout."
          fi

      - name: Install JavaScript dependencies
        run: npm install --no-audit --no-fund

      - name: Build the release APK
        run: |
          chmod +x android/gradlew
          cd android
          ./gradlew assembleRelease --no-daemon

      - name: Show APK signer certificate
        run: |
          APK=android/app/build/outputs/apk/release/app-release.apk
          "$ANDROID_HOME"/build-tools/36.0.0/apksigner verify --print-certs "$APK" || true

      - name: Upload the APK
        uses: actions/upload-artifact@v4
        with:
          name: FreeKiosk-battlock-apk
          path: android/app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error
          retention-days: 30
